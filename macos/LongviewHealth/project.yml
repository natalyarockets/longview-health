name: LongviewHealth
options:
  bundleIdPrefix: com.longviewhealth
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 7.0.0

targets:
  LongviewHealth:
    type: application
    platform: macOS
    sources:
      - LongviewHealth
    resources:
      - path: LongviewHealth/Resources/longview-engine
        optional: true
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longviewhealth.app
        PRODUCT_NAME: Longview Health
        INFOPLIST_FILE: LongviewHealth/Info.plist
        CODE_SIGN_ENTITLEMENTS: LongviewHealth/LongviewHealth.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GRDB
