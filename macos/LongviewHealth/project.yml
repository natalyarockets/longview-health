name: LongviewHealth
options:
  bundleIdPrefix: com.longviewhealth
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 7.0.0

targets:
  LongviewHealth:
    type: application
    platform: macOS
    sources:
      - path: LongviewHealth
        excludes:
          - Resources/longview-engine/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longviewhealth.app
        PRODUCT_NAME: Longview Health
        INFOPLIST_FILE: LongviewHealth/Info.plist
        CODE_SIGN_ENTITLEMENTS: LongviewHealth/LongviewHealth.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: GRDB
    preBuildScripts:
      - name: Copy Longview Engine
        script: |
          ENGINE_SRC="${PROJECT_DIR}/LongviewHealth/Resources/longview-engine"
          ENGINE_DST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/longview-engine"
          if [ -d "$ENGINE_SRC" ]; then
            mkdir -p "$(dirname "$ENGINE_DST")"
            rsync -a --delete "$ENGINE_SRC/" "$ENGINE_DST/"
            echo "Copied longview-engine to app bundle"
          else
            echo "warning: longview-engine not found at $ENGINE_SRC (run packaging/build_engine.sh first)"
          fi
        basedOnDependencyAnalysis: false
